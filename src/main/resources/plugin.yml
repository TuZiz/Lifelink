name: LifeLink
version: '${version}'
main: com.lifelink.treelifecycle.bootstrap.LifeLinkPlugin
api-version: '1.20'
load: POSTWORLD
folia-supported: true
authors: [ ymxc ]
description: Tree lifecycle replanting and managed sapling protection for Spigot, Paper and Folia.

commands:
  lifelink:
    description: LifeLink administration command
    usage: /lifelink <reload|recover|saplingmode|wilderness>

permissions:
  lifelink.admin:
    default: op
  lifelink.reload:
    default: op
  lifelink.recover:
    default: op
  lifelink.stats:
    default: op
  lifelink.inspect:
    default: op
  lifelink.admin.sapling-mode:
    default: op
  lifelink.bypass.sapling-protection:
    default: op
  lifelink.bypass.managed-tree:
    default: op
  lifelink.wilderness.scan:
    default: op
  lifelink.wilderness.preview:
    default: op
  lifelink.wilderness.restore:
    default: op
  lifelink.wilderness.restore.force:
    default: op
  lifelink.wilderness.confirm:
    default: op
  lifelink.wilderness.rollback:
    default: op
  lifelink.wilderness.protect:
    default: op
  lifelink.wilderness.debug:
    default: op
