prefix: "<gradient:#22c55e:#38bdf8><bold>LifeLink</bold></gradient> <dark_gray>»</dark_gray>"
messages:
  # Plugin message prefix, MiniMessage format.
  prefix: "<#48CAE4>✦ LifeLink</#48CAE4> <#A9AEB8>»</#A9AEB8> "
  plugin-loading:
    type: actionbar
    text: "<prefix><#FFB86C>The plugin is still loading async state, please retry in a moment.</#FFB86C>"
  no-permission:
    type: chat
    text: "<prefix><#FF5555>You do not have permission to do that.</#FF5555>"
  protected-sapling:
    type: actionbar
    text: "<prefix><#FF5555>System replanted plants are protected and cannot be broken or replaced.</#FF5555>"
  reload-started:
    type: chat
    text: "<prefix><#8BE9FD>Reloading configuration and language files asynchronously.</#8BE9FD>"
  reload-success:
    type: chat
    text: "<prefix><#50FA7B>Reload completed.</#50FA7B>"
  reload-failed:
    type: chat
    text: "<prefix><#FF5555>Reload failed: <reason></#FF5555>"
  recovery-queued:
    type: chat
    text: "<prefix><#8BE9FD>Queued <reason> recovery checks.</#8BE9FD>"
  player-only-command:
    type: chat
    text: "<prefix><#FF5555>This command can only be used by an online player.</#FF5555>"
  sapling-mode-enabled:
    type: chat
    text: "<prefix><#50FA7B>Admin sapling mode enabled. Saplings you place will be managed for automatic replanting.</#50FA7B>"
  sapling-mode-disabled:
    type: chat
    text: "<prefix><#A9AEB8>Admin sapling mode disabled.</#A9AEB8>"
  sapling-mode-recorded:
    type: actionbar
    text: "<prefix><#50FA7B>Marked this <tree_type> sapling for automatic replanting.</#50FA7B>"
  sapling-mode-usage:
    type: chat
    text: "<prefix><#8BE9FD>Usage: /lifelink saplingmode <#50FA7B>on</#50FA7B>|<#FF5555>off</#FF5555>|<#F1FA8C>status</#F1FA8C></#8BE9FD>"
  command-usage:
    type: chat
    text: "<prefix><#38bdf8>Run <#ffffff>/lifelink help</#ffffff> for command help.</#38bdf8>"


  status-summary:
    type: chat
    text: "<prefix><#38bdf8>LifeLink is running with tree lifecycle and conservative wilderness restore modules loaded.</#38bdf8>"
  inspect-usage:
    type: chat
    text: "<prefix><#38bdf8>Use wilderness scan, preview, or protect commands after targeting an area.</#38bdf8>"
  debug-summary:
    type: chat
    text: "<prefix><#38bdf8>Debug target <#ffffff><target></#ffffff>, Folia=<#ffffff><folia></#ffffff>.</#38bdf8>"
  wilderness-command-usage:
    type: chat
    text: "<prefix><#38bdf8>Run <#ffffff>/lifelink wilderness help</#ffffff> for wilderness restore help.</#38bdf8>"
  wilderness-scan-start:
    type: chat
    text: "<prefix><#38bdf8>Scanning wilderness area in <#ffffff><world></#ffffff>, range <#ffffff><radius></#ffffff>.</#38bdf8>"
  wilderness-scan-finished:
    type: chat
    text: "<prefix><#22c55e>Scan complete: low <#ffffff><low></#ffffff>, medium <#ffffff><medium></#ffffff>, high <#ffffff><high></#ffffff>, build score <#ffffff><build></#ffffff>, assets <#ffffff><assets></#ffffff>.</#22c55e>"
  wilderness-preview-created:
    type: chat
    text: "<prefix><#38bdf8>Wilderness preview created. Green=restorable, yellow=confirm required, red=protected.</#38bdf8>"
  wilderness-preview-cleared:
    type: chat
    text: "<prefix><#a78bfa>Wilderness preview cleared.</#a78bfa>"
  wilderness-restore-created:
    type: chat
    text: "<prefix><#38bdf8>Wilderness restore job created: <#ffffff><job_id></#ffffff>.</#38bdf8>"
  wilderness-confirm-required:
    type: chat
    text: "<prefix><#facc15>This job contains medium-risk areas. Run <#ffffff>/lifelink wilderness confirm <job_id></#ffffff> to continue.</#facc15>"
  wilderness-restore-started:
    type: chat
    text: "<prefix><#38bdf8>Wilderness restore job <#ffffff><job_id></#ffffff> started.</#38bdf8>"
  wilderness-restore-completed:
    type: chat
    text: "<prefix><#22c55e>Wilderness restore job <#ffffff><job_id></#ffffff> completed, restored <#ffffff><blocks></#ffffff> blocks and skipped <#ffffff><skipped></#ffffff> protected blocks.</#22c55e>"
  wilderness-restore-failed:
    type: chat
    text: "<prefix><#ef4444>Wilderness restore job <#ffffff><job_id></#ffffff> failed: <#ffffff><reason></#ffffff></#ef4444>"
  wilderness-rollback-started:
    type: chat
    text: "<prefix><#facc15>Wilderness rollback job <#ffffff><job_id></#ffffff> started.</#facc15>"
  wilderness-rollback-completed:
    type: chat
    text: "<prefix><#22c55e>Wilderness rollback job <#ffffff><job_id></#ffffff> completed.</#22c55e>"
  wilderness-protected-hit:
    type: actionbar
    text: "<prefix><#facc15>This area contains player assets and was skipped.</#facc15>"
  wilderness-container-found:
    type: chat
    text: "<prefix><#ef4444>Container or inventory assets found; automatic restore is denied by default.</#ef4444>"
  wilderness-redstone-found:
    type: chat
    text: "<prefix><#ef4444>Redstone machinery found; automatic restore is denied by default.</#ef4444>"
  wilderness-building-found:
    type: chat
    text: "<prefix><#facc15>Possible player building found and marked as medium/high risk.</#facc15>"
  wilderness-selection-missing:
    type: chat
    text: "<prefix><#facc15>Set a selection first with /lifelink wilderness pos1 and pos2.</#facc15>"
  wilderness-pos-set:
    type: chat
    text: "<prefix><#22c55e>Set <#ffffff><pos></#ffffff>.</#22c55e>"
  wilderness-protect-created:
    type: chat
    text: "<prefix><#22c55e>Created manual protected area <#ffffff><name></#ffffff> (<#ffffff><id></#ffffff>).</#22c55e>"
  wilderness-protect-line:
    type: chat
    text: "<prefix><#38bdf8>Protected area <#ffffff><id></#ffffff>: <#ffffff><name></#ffffff></#38bdf8>"
  wilderness-protect-removed:
    type: chat
    text: "<prefix><#22c55e>Removed manual protected area <#ffffff><id></#ffffff>.</#22c55e>"
  wilderness-job-line:
    type: chat
    text: "<prefix><#38bdf8>Job <#ffffff><job_id></#ffffff>: <#ffffff><status></#ffffff> / <#ffffff><mode></#ffffff> / blocks <#ffffff><blocks></#ffffff></#38bdf8>"
  wilderness-job-detail:
    type: chat
    text: "<prefix><#38bdf8>Job <#ffffff><job_id></#ffffff> status <#ffffff><status></#ffffff>, mode <#ffffff><mode></#ffffff>, blocks <#ffffff><blocks></#ffffff>, skipped <#ffffff><skipped></#ffffff>, reason <#ffffff><reason></#ffffff>.</#38bdf8>"
  wilderness-jobs-empty:
    type: chat
    text: "<prefix><#a9aeb8>No wilderness restore jobs.</#a9aeb8>"
  wilderness-job-not-found:
    type: chat
    text: "<prefix><#ef4444>Job or protected area not found: <#ffffff><job_id></#ffffff>.</#ef4444>"
  wilderness-job-cancelled:
    type: chat
    text: "<prefix><#facc15>Cancelled wilderness restore job <#ffffff><job_id></#ffffff>.</#facc15>"
  wilderness-job-not-confirmable:
    type: chat
    text: "<prefix><#facc15>This job is not waiting for confirmation.</#facc15>"

  help-title:
    type: chat
    text: "<prefix><gradient:#22c55e:#38bdf8><bold>LifeLink Help</bold></gradient> <#a9aeb8>Tree lifecycle + conservative wilderness restore</#a9aeb8>"
  help-tree:
    type: chat
    text: "<#22c55e>/lifelink recover</#22c55e> <#a9aeb8>- Recheck unfinished tree replant tasks; does not restore wilderness.</#a9aeb8>"
  help-saplingmode:
    type: chat
    text: "<#22c55e>/lifelink saplingmode on/off/status</#22c55e> <#a9aeb8>- Admin-placed saplings enter managed lifecycle.</#a9aeb8>"
  help-wilderness:
    type: chat
    text: "<#38bdf8>/lifelink wilderness</#38bdf8> <#a9aeb8>- Old-server restore entry: scan first, preview next, restore last.</#a9aeb8>"
  help-wilderness-flow:
    type: chat
    text: "<#facc15>Suggested flow</#facc15><#a9aeb8>: scan risk -> preview area -> protect builds -> restore low-risk terrain.</#a9aeb8>"
  help-admin:
    type: chat
    text: "<#a78bfa>/lifelink reload</#a78bfa> <#a9aeb8>- Reload config and language asynchronously.</#a9aeb8>"
  help-next:
    type: chat
    text: "<#ffffff>More</#ffffff><#a9aeb8>: /lifelink wilderness help, or /lifelink wilderness help restore.</#a9aeb8>"
  wilderness-help-title:
    type: chat
    text: "<prefix><gradient:#22c55e:#38bdf8><bold>Wilderness Help</bold></gradient> <#a9aeb8>Conservative by default; skip uncertain areas.</#a9aeb8>"
  wilderness-help-purpose:
    type: chat
    text: "<#38bdf8>Purpose</#38bdf8><#a9aeb8>: repair craters, scarred surfaces, water/lava pollution, and floating leftovers; not player buildings.</#a9aeb8>"
  wilderness-help-flow:
    type: chat
    text: "<#facc15>Flow</#facc15><#a9aeb8>: scan only checks -> preview particles -> restore low risk -> rollback from snapshot.</#a9aeb8>"
  wilderness-help-scan:
    type: chat
    text: "<#22c55e>scan</#22c55e><#a9aeb8>: checks only. chunk=current chunk, radius=nearby area, selection=pos1/pos2 area.</#a9aeb8>"
  wilderness-help-preview:
    type: chat
    text: "<#38bdf8>preview</#38bdf8><#a9aeb8>: particles only. Green=restorable, yellow=confirm, red=protected/high risk.</#a9aeb8>"
  wilderness-help-restore:
    type: chat
    text: "<#ef4444>restore</#ef4444><#a9aeb8>: copies natural blocks from world_origin. LOW runs, MEDIUM needs confirm, HIGH is denied.</#a9aeb8>"
  wilderness-help-protect:
    type: chat
    text: "<#facc15>protect</#facc15><#a9aeb8>: manually protects player builds. chunk/radius now, pos1/pos2/create for selection.</#a9aeb8>"
  wilderness-help-selection:
    type: chat
    text: "<#a78bfa>Selection</#a78bfa><#a9aeb8>: stand at one corner and run /lifelink wilderness pos1, then another corner and pos2.</#a9aeb8>"
  wilderness-help-area:
    type: chat
    text: "<#38bdf8>Area</#38bdf8><#a9aeb8>: chunk=current chunk; radius [radius]=nearby area; selection=pos1/pos2.</#a9aeb8>"
  wilderness-help-risk:
    type: chat
    text: "<#facc15>Risk</#facc15><#a9aeb8>: chest/bed/redstone/TileState=high; signs/build score/asset index=medium.</#a9aeb8>"
  wilderness-help-safety:
    type: chat
    text: "<#ef4444>Safety</#ef4444><#a9aeb8>: snapshot first; restore skips containers, redstone, TileState, and protection masks again.</#a9aeb8>"
  wilderness-help-rollback:
    type: chat
    text: "<#22c55e>rollback [jobId]</#22c55e><#a9aeb8>: rolls back from snapshot. Use /lifelink wilderness jobs to find jobId.</#a9aeb8>"
  wilderness-help-jobs:
    type: chat
    text: "<#38bdf8>jobs/job</#38bdf8><#a9aeb8>: jobs lists recent jobs; job [id] shows status, restored blocks, and skipped blocks.</#a9aeb8>"
  wilderness-help-examples:
    type: chat
    text: "<#ffffff>Examples</#ffffff><#a9aeb8>: /lifelink wilderness scan chunk; preview radius 32; restore surface 32; protect chunk.</#a9aeb8>"
tree-types:
  oak: "Oak"
  birch: "Birch"
  spruce: "Spruce"
  jungle: "Jungle"
  acacia: "Acacia"
  dark_oak: "Dark Oak"
  mangrove: "Mangrove"
  cherry: "Cherry"
  pale_oak: "Pale Oak"

sounds:
  success:
    enabled: true
    name: "minecraft:block.note_block.pling"
    volume: 1.0
    pitch: 1.2
  error:
    enabled: true
    name: "minecraft:block.note_block.bass"
    volume: 1.0
    pitch: 0.7
  warning:
    enabled: true
    name: "minecraft:block.note_block.bit"
    volume: 1.0
    pitch: 0.9
  replant:
    enabled: true
    name: "minecraft:item.crop.plant"
    volume: 0.8
    pitch: 1.0
  wilderness-preview:
    enabled: true
    name: "minecraft:block.amethyst_block.chime"
    volume: 0.8
    pitch: 1.4
  wilderness-restore:
    enabled: true
    name: "minecraft:block.grass.place"
    volume: 0.8
    pitch: 1.1
