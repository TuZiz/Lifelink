prefix: "<gradient:#22c55e:#38bdf8><bold>LifeLink</bold></gradient> <dark_gray>»</dark_gray>"
messages:
  # 插件消息前缀：独立配置，正文通过 <prefix> 引用。
  prefix: "<#48CAE4>✦ 生生不息</#48CAE4> <#A9AEB8>»</#A9AEB8> "

  plugin-loading:
    type: actionbar
    text: "<prefix><#F8F3D4>插件正处于异步加载状态，请稍候...</#F8F3D4>"

  no-permission:
    type: chat
    text: "<prefix><#FF6B6B>✖ 你没有执行此操作的权限。</#FF6B6B>"

  protected-sapling:
    type: actionbar
    text: "<prefix><#FF6B6B>✖ 系统补种的植物受保护，无法直接破坏或替换。</#FF6B6B>"

  harvest-busy:
    type: actionbar
    text: "<prefix><#FCA311>⚠ 该位置正在处理生命周期任务，请勿重复触发。</#FCA311>"

  harvest-replant-success:
    type: actionbar
    text: "<prefix><#4DDB86>✔ <tree_type> 已在原位置完成自动补种。</#4DDB86>"

  replant-retry-scheduled:
    type: chat
    text: "<prefix><#FFC048>↻ 暂时无法补种，系统将自动重试 ┃ 原因: <reason></#FFC048>"

  replant-failed:
    type: chat
    text: "<prefix><#FF6B6B>✖ 自动补种失败 ┃ 原因: <reason></#FF6B6B>"

  reload-started:
    type: chat
    text: "<prefix><#48CAE4>↻ 开始异步重载配置与语言文件...</#48CAE4>"

  reload-success:
    type: chat
    text: "<prefix><#4DDB86>✔ 异步重载完成。</#4DDB86>"

  reload-failed:
    type: chat
    text: "<prefix><#FF6B6B>✖ 重载失败 ┃ <reason></#FF6B6B>"

  recovery-queued:
    type: chat
    text: "<prefix><#48CAE4>已成功提交 <reason> 个恢复检查任务。</#48CAE4>"

  player-only-command:
    type: chat
    text: "<prefix><#FF6B6B>✖ 这个指令只能由在线玩家执行。</#FF6B6B>"

  sapling-mode-enabled:
    type: chat
    text: "<prefix><#4DDB86>✔ 已开启管理员补种树苗模式。接下来你放置的树苗会作为系统托管树苗。</#4DDB86>"

  sapling-mode-disabled:
    type: chat
    text: "<prefix><#A9AEB8>已关闭管理员补种树苗模式。</#A9AEB8>"

  sapling-mode-recorded:
    type: actionbar
    text: "<prefix><#4DDB86>已将 <tree_type> 树苗标记为可自动补种。</#4DDB86>"

  sapling-mode-usage:
    type: chat
    text: "<prefix><#48CAE4>用法: /lifelink saplingmode <#4DDB86>on</#4DDB86>|<#FF6B6B>off</#FF6B6B>|<#F8F3D4>status</#F8F3D4></#48CAE4>"

  command-usage:
    type: chat
    text: "<prefix><#38bdf8>输入 <#ffffff>/lifelink help</#ffffff> 查看命令说明。</#38bdf8>"


  status-summary:
    type: chat
    text: "<prefix><#38bdf8>LifeLink 运行中：树木生命周期与保守型荒野修复模块已加载。</#38bdf8>"

  inspect-usage:
    type: chat
    text: "<prefix><#38bdf8>请看准目标方块后使用荒野 scan/preview/protect 指令进行检查。</#38bdf8>"

  debug-summary:
    type: chat
    text: "<prefix><#38bdf8>调试目标 <#ffffff><target></#ffffff>，Folia=<#ffffff><folia></#ffffff>。</#38bdf8>"

  wilderness-command-usage:
    type: chat
    text: "<prefix><#38bdf8>输入 <#ffffff>/lifelink wilderness help</#ffffff> 查看荒野修复说明。</#38bdf8>"

  wilderness-scan-start:
    type: chat
    text: "<prefix><#38bdf8>开始扫描荒野区域：<#ffffff><world></#ffffff>，范围 <#ffffff><radius></#ffffff>。</#38bdf8>"

  wilderness-scan-finished:
    type: chat
    text: "<prefix><#22c55e>扫描完成：低风险 <#ffffff><low></#ffffff>，中风险 <#ffffff><medium></#ffffff>，高风险 <#ffffff><high></#ffffff>，建筑分 <#ffffff><build></#ffffff>，疑似资产 <#ffffff><assets></#ffffff>。</#22c55e>"

  wilderness-preview-created:
    type: chat
    text: "<prefix><#38bdf8>已生成荒野修复预览。绿色=可恢复，黄色=需确认，红色=保护区域。</#38bdf8>"

  wilderness-preview-cleared:
    type: chat
    text: "<prefix><#a78bfa>已清除荒野修复预览。</#a78bfa>"

  wilderness-restore-created:
    type: chat
    text: "<prefix><#38bdf8>荒野修复任务已创建：<#ffffff><job_id></#ffffff>。</#38bdf8>"

  wilderness-confirm-required:
    type: chat
    text: "<prefix><#facc15>该任务包含中风险区域，需要执行 <#ffffff>/lifelink wilderness confirm <job_id></#ffffff> 确认。</#facc15>"

  wilderness-restore-started:
    type: chat
    text: "<prefix><#38bdf8>荒野修复任务 <#ffffff><job_id></#ffffff> 已开始。</#38bdf8>"

  wilderness-restore-completed:
    type: chat
    text: "<prefix><#22c55e>荒野修复任务 <#ffffff><job_id></#ffffff> 已完成，恢复 <#ffffff><blocks></#ffffff> 个方块，跳过 <#ffffff><skipped></#ffffff> 个保护方块。</#22c55e>"

  wilderness-restore-failed:
    type: chat
    text: "<prefix><#ef4444>荒野修复任务 <#ffffff><job_id></#ffffff> 失败：<#ffffff><reason></#ffffff></#ef4444>"

  wilderness-rollback-started:
    type: chat
    text: "<prefix><#facc15>荒野回滚任务 <#ffffff><job_id></#ffffff> 已开始。</#facc15>"

  wilderness-rollback-completed:
    type: chat
    text: "<prefix><#22c55e>荒野回滚任务 <#ffffff><job_id></#ffffff> 已完成。</#22c55e>"

  wilderness-protected-hit:
    type: actionbar
    text: "<prefix><#facc15>该区域包含玩家资产，已自动跳过。</#facc15>"

  wilderness-container-found:
    type: chat
    text: "<prefix><#ef4444>检测到容器或库存资产，默认禁止自动恢复。</#ef4444>"

  wilderness-redstone-found:
    type: chat
    text: "<prefix><#ef4444>检测到红石机器，默认禁止自动恢复。</#ef4444>"

  wilderness-building-found:
    type: chat
    text: "<prefix><#facc15>检测到疑似玩家建筑，已标记为中/高风险。</#facc15>"

  wilderness-selection-missing:
    type: chat
    text: "<prefix><#facc15>请先使用 /lifelink wilderness pos1 和 pos2 设置选区。</#facc15>"

  wilderness-pos-set:
    type: chat
    text: "<prefix><#22c55e>已设置 <#ffffff><pos></#ffffff>。</#22c55e>"

  wilderness-protect-created:
    type: chat
    text: "<prefix><#22c55e>已创建手动保护区 <#ffffff><name></#ffffff>（<#ffffff><id></#ffffff>）。</#22c55e>"

  wilderness-protect-line:
    type: chat
    text: "<prefix><#38bdf8>保护区 <#ffffff><id></#ffffff>：<#ffffff><name></#ffffff></#38bdf8>"

  wilderness-protect-removed:
    type: chat
    text: "<prefix><#22c55e>已移除手动保护区 <#ffffff><id></#ffffff>。</#22c55e>"

  wilderness-job-line:
    type: chat
    text: "<prefix><#38bdf8>任务 <#ffffff><job_id></#ffffff>：<#ffffff><status></#ffffff> / <#ffffff><mode></#ffffff> / 方块 <#ffffff><blocks></#ffffff></#38bdf8>"

  wilderness-job-detail:
    type: chat
    text: "<prefix><#38bdf8>任务 <#ffffff><job_id></#ffffff> 状态 <#ffffff><status></#ffffff>，模式 <#ffffff><mode></#ffffff>，方块 <#ffffff><blocks></#ffffff>，跳过 <#ffffff><skipped></#ffffff>，原因 <#ffffff><reason></#ffffff>。</#38bdf8>"

  wilderness-jobs-empty:
    type: chat
    text: "<prefix><#a9aeb8>当前没有荒野修复任务。</#a9aeb8>"

  wilderness-job-not-found:
    type: chat
    text: "<prefix><#ef4444>未找到任务或保护区：<#ffffff><job_id></#ffffff>。</#ef4444>"

  wilderness-job-cancelled:
    type: chat
    text: "<prefix><#facc15>已取消荒野修复任务 <#ffffff><job_id></#ffffff>。</#facc15>"

  wilderness-job-not-confirmable:
    type: chat
    text: "<prefix><#facc15>该任务当前状态不需要确认或不能确认。</#facc15>"

  help-title:
    type: chat
    text: "<prefix><gradient:#22c55e:#38bdf8><bold>LifeLink 帮助</bold></gradient> <#a9aeb8>树木托管 + 保守型荒野修复</#a9aeb8>"
  help-tree:
    type: chat
    text: "<#22c55e>/lifelink recover</#22c55e> <#a9aeb8>- 重扫未完成的树木补种任务，不会乱改荒野。</#a9aeb8>"
  help-saplingmode:
    type: chat
    text: "<#22c55e>/lifelink saplingmode on/off/status</#22c55e> <#a9aeb8>- 管理员放树苗时纳入系统托管。</#a9aeb8>"
  help-wilderness:
    type: chat
    text: "<#38bdf8>/lifelink wilderness</#38bdf8> <#a9aeb8>- 老服荒野修复入口：先扫描，后预览，再恢复。</#a9aeb8>"
  help-wilderness-flow:
    type: chat
    text: "<#facc15>推荐流程</#facc15><#a9aeb8>：scan 检查风险 -> preview 看范围 -> protect 保护建筑 -> restore 修复低风险。</#a9aeb8>"
  help-admin:
    type: chat
    text: "<#a78bfa>/lifelink reload</#a78bfa> <#a9aeb8>- 异步重载配置和语言。</#a9aeb8>"
  help-next:
    type: chat
    text: "<#ffffff>更多说明</#ffffff><#a9aeb8>：/lifelink wilderness help，或 /lifelink wilderness help restore。</#a9aeb8>"
  wilderness-help-title:
    type: chat
    text: "<prefix><gradient:#22c55e:#38bdf8><bold>荒野修复帮助</bold></gradient> <#a9aeb8>默认保守，不确定就跳过。</#a9aeb8>"
  wilderness-help-purpose:
    type: chat
    text: "<#38bdf8>用途</#38bdf8><#a9aeb8>：修爆炸坑、乱挖地表、水/岩浆污染、浮空残留；不用于覆盖玩家建筑。</#a9aeb8>"
  wilderness-help-flow:
    type: chat
    text: "<#facc15>流程</#facc15><#a9aeb8>：scan 只扫描 -> preview 粒子预览 -> restore 低风险恢复 -> rollback 从快照回滚。</#a9aeb8>"
  wilderness-help-scan:
    type: chat
    text: "<#22c55e>scan</#22c55e><#a9aeb8>：只检查不改方块。chunk=当前区块，radius=半径范围，selection=pos1/pos2 选区。</#a9aeb8>"
  wilderness-help-preview:
    type: chat
    text: "<#38bdf8>preview</#38bdf8><#a9aeb8>：只显示粒子，绿色可恢复，黄色需确认，红色保护/高风险。</#a9aeb8>"
  wilderness-help-restore:
    type: chat
    text: "<#ef4444>restore</#ef4444><#a9aeb8>：从 world_origin 复制自然方块。LOW 自动执行，MEDIUM 需要 confirm，HIGH 拒绝。</#a9aeb8>"
  wilderness-help-protect:
    type: chat
    text: "<#facc15>protect</#facc15><#a9aeb8>：手动保护玩家建筑。chunk/radius 立即保护，pos1/pos2/create 创建选区保护。</#a9aeb8>"
  wilderness-help-selection:
    type: chat
    text: "<#a78bfa>选区</#a78bfa><#a9aeb8>：先站到一角 /lifelink wilderness pos1，再站另一角 /lifelink wilderness pos2。</#a9aeb8>"
  wilderness-help-area:
    type: chat
    text: "<#38bdf8>范围</#38bdf8><#a9aeb8>：chunk 当前区块；radius [半径] 周围区域；selection 使用 pos1/pos2。</#a9aeb8>"
  wilderness-help-risk:
    type: chat
    text: "<#facc15>风险</#facc15><#a9aeb8>：箱子/床/红石/TileState=高风险；告示牌/建筑分/资产索引=中风险。</#a9aeb8>"
  wilderness-help-safety:
    type: chat
    text: "<#ef4444>安全</#ef4444><#a9aeb8>：恢复前写快照；执行时再次跳过容器、红石、TileState、保护遮罩。</#a9aeb8>"
  wilderness-help-rollback:
    type: chat
    text: "<#22c55e>rollback [jobId]</#22c55e><#a9aeb8>：按恢复前快照回滚，jobId 可用 /lifelink wilderness jobs 查看。</#a9aeb8>"
  wilderness-help-jobs:
    type: chat
    text: "<#38bdf8>jobs/job</#38bdf8><#a9aeb8>：jobs 列出最近任务；job [id] 查看任务状态、恢复数量和跳过数量。</#a9aeb8>"
  wilderness-help-examples:
    type: chat
    text: "<#ffffff>示例</#ffffff><#a9aeb8>：/lifelink wilderness scan chunk；preview radius 32；restore surface 32；protect chunk。</#a9aeb8>"
tree-types:
  oak: "橡木"
  birch: "白桦木"
  spruce: "云杉木"
  jungle: "丛林木"
  acacia: "金合欢木"
  dark_oak: "深色橡木"
  mangrove: "红树木"
  cherry: "樱花木"
  pale_oak: "苍白橡木"

sounds:
  success:
    enabled: true
    name: "minecraft:block.note_block.pling"
    volume: 1.0
    pitch: 1.2
  error:
    enabled: true
    name: "minecraft:block.note_block.bass"
    volume: 1.0
    pitch: 0.7
  warning:
    enabled: true
    name: "minecraft:block.note_block.bit"
    volume: 1.0
    pitch: 0.9
  replant:
    enabled: true
    name: "minecraft:item.crop.plant"
    volume: 0.8
    pitch: 1.0
  wilderness-preview:
    enabled: true
    name: "minecraft:block.amethyst_block.chime"
    volume: 0.8
    pitch: 1.4
  wilderness-restore:
    enabled: true
    name: "minecraft:block.grass.place"
    volume: 0.8
    pitch: 1.1
